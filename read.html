<body onload="" topmargin="0" leftmargin="0" bottommargin="0" rightmargin="0"><script>
	
	const params = new URLSearchParams(window.location.search);

let recordID = null;
let pathID = null;

if (params.has('object')) {
    recordID = params.get('object');
    pathID = 'objects';
} else if (params.has('heightmap')) {
    recordID = params.get('heightmap');
    pathID = 'heightmaps';
} else if (params.has('image')) {
    recordID = params.get('image');
    pathID = 'images';
} else if (params.has('link')) {
    recordID = params.get('link');
    pathID = 'links';
}


	loadDEA(pathID,recordID);dea_view.print();</script></body></html>
