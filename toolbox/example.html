<!DOCTYPE html>
<html>
  <head>
    <title>Processing.js Example Page</title>
    <meta charset="UTF-8">
    <script type="text/javascript" src="processing-1.4.1.min.js"></script>
  </head>

  <body>
    <script type="text/processing">
      //  Processing.js example sketch
      int fontsize = 24;

      void setup() {
        size(700, 400);
        stroke(0);
        fill(0);
        textFont(createFont("Arial",fontsize));
        //noLoop();
      }

      void draw() {
        background(#F0F0E0);
        String textstring = "inline example";
        float twidth = textWidth(textstring);
        text(textstring, (width-twidth)/2, height/2);
		rect(100,10,200,10);
      }
    </script>
    <canvas style="border: 1px solid black;"></canvas>
  </body>
</html>
